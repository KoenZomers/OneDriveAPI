name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.x'
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
    - name: Restore NuGet packages
      run: nuget restore KoenZomers.OneDrive.Api.sln
    - name: Restore .NET dependencies
      run: dotnet restore KoenZomers.OneDrive.Api.sln
    - name: Build
      run: msbuild KoenZomers.OneDrive.Api.sln /p:Configuration=Release /t:Restore,Build
    - name: Test
      run: dotnet test Api\API.csproj --no-restore --verbosity normal --configuration Release
